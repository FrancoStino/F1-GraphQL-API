name: Aiven Database Keep-Alive

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' 
          
      - name: Install dependencies
        run: yarn install
        
      - name: Build Prisma Schema
        run: yarn build 
        
      - name: Ping Database
        run: |
          npx tsx -e "
            import { PrismaClient } from '@prisma/client';
            const prisma = new PrismaClient();
            
            async function ping() {
              await prisma.\$queryRawUnsafe('SELECT 1');
              console.log('Ping al database eseguito con successo!');
              await prisma.\$disconnect();
            }
            
            ping().catch(e => {
              console.error(e);
              process.exit(1);
            });
          "
